name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint shell scripts (shellcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck stow curl unzip
          ./scripts/security_audit.sh

      - name: Install (no packages)
        env:
          DOTFILES_DIR: ${{ github.workspace }}
        run: |
          bash install.sh --dir "$DOTFILES_DIR" --no-packages --no-csv

      - name: Verify stowed files
        run: |
          test -L "$HOME/.tmux.conf" || (echo "tmux conf not linked" && exit 1)
          test -d "$HOME/.bashrc.d" || (echo "bashrc.d missing" && exit 1)
